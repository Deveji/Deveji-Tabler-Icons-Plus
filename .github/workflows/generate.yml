name: Generate Tabler icon font

on:
  workflow_dispatch:
    inputs:
      tabler_version:
        description: '@tabler/icons version (blank = latest)'
        required: false
      package_version:
        description: 'Package version override (blank = use tabler version)'
        required: false
  schedule:
    - cron: '0 6 * * *'
  push:
    branches:
      - main
    paths:
      - 'tool/config/icons.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tool/package-lock.json

      - name: Install deps
        working-directory: tool
        run: |
          VERSION=${{ github.event.inputs.tabler_version }}
          if [ -n "$VERSION" ]; then
            npm install @tabler/icons@$VERSION
          else
            npm install
          fi

      - name: Run pipeline
        working-directory: tool
        run: npm run build

      - name: Override package version
        if: github.event.inputs.package_version != ''
        run: |
          sed -i "s/^version: .*/version: ${{ github.event.inputs.package_version }}/" pubspec.yaml

      - name: Read build metadata
        id: meta
        run: |
          TABLER_VERSION=$(node -p "require('./tool/node_modules/@tabler/icons/package.json').version")
          COUNT=$(node -p "Object.keys(require('./tool/output/TablerIcons.json')).length")
          PKG_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "tabler_version=$TABLER_VERSION" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: diff
        run: |
          git add -A
          git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT \
                                     || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update Tabler Icons to v${{ steps.meta.outputs.tabler_version }}"
          git push

      - name: Create release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on remote, skipping release."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "v${{ steps.meta.outputs.version }}" \
            --notes "Updated to @tabler/icons v${{ steps.meta.outputs.tabler_version }} — ${{ steps.meta.outputs.count }} icons."
